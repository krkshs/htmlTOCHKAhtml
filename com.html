<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Реальный Онлайн</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Courier New', Courier, monospace; user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Реалистичный VHS фильтр */
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; z-index: 2; pointer-events: none; opacity: 0.85;
        }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #242214; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; color: #d1c28a; text-align: center;
        }
        #menu h1 { font-size: 3rem; margin-bottom: 5px; letter-spacing: 5px; color: #eedc82; text-shadow: 3px 3px 0px #000; }
        .input-group { margin-bottom: 20px; }
        #nickname-input {
            background: #15140b; border: 2px solid #54503d; padding: 12px 20px;
            font-size: 1.2rem; color: #fff; outline: none; text-align: center; border-radius: 4px; font-family: inherit;
        }
        #start-btn {
            background: #eedc82; color: #1a1913; border: none; padding: 12px 30px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 4px;
            box-shadow: 0 4px 0px #8a8158; font-family: inherit;
        }
        #start-btn:hover { background: #fff1b0; }

        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 5;
            color: #e2d69a; font-size: 1.1rem; pointer-events: none; display: none;
            text-shadow: 1px 1px 2px #000;
        }
        
        /* ЛЕВЫЙ НИЖНИЙ БЛОК: Данные сервера */
        #server-info {
            position: absolute; bottom: 20px; left: 20px; z-index: 5;
            color: #eedc82; font-size: 0.85rem; pointer-events: none; display: none;
            text-shadow: 1px 1px 2px #000; background: rgba(21, 20, 11, 0.7);
            padding: 8px 12px; border-radius: 4px; border: 1px solid rgba(238, 220, 130, 0.2);
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 5; pointer-events: none; display: none;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(217, 201, 131, 0.7); font-size: 0.9rem; z-index: 5; pointer-events: none; text-align: center; display: none;
        }
        #jumpscare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505;
            z-index: 100; display: none; justify-content: center; align-items: center; color: #800; font-size: 4rem; font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>

    <div id="vhs-overlay"></div>

    <div id="menu">
        <h1>THE BACKROOMS</h1>
        <p>Уровень 0 • Настоящий Онлайн (GitHub версия)</p>
        <div class="input-group">
            <input type="text" id="nickname-input" placeholder="Ваш ник" maxlength="12" value="Игрок">
        </div>
        <button id="start-btn">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="hud">
        <div id="player-name">Игрок: -</div>
        <div id="online-count">В игре: 1</div>
    </div>

    <div id="server-info">
        TARGET ADDR: <span id="srv-ip">127.0.0.1</span><br>
        TARGET PORT: <span id="srv-port">3000</span><br>
        STATUS: <span id="srv-status" style="color: #6c5;">CONNECTING</span>
    </div>

    <div id="crosshair"></div>
    <div id="instructions">WASD — Ходить | Shift — Бег | F — Фонарик | Клик по экрану активирует мышь</div>
    <div id="jumpscare">ВЫ ПОЙМАНЫ</div>

    <div id="canvas-container"></div>

    <script>
        // ========================================================
        // НАСТРОЙКИ СЕРВЕРА ДЛЯ ТЕБЯ
        // ========================================================
        const USE_NODE_SERVER = false;        // Поставь true, когда мы создадим Node.js бэкенд
        const SERVER_IP = "127.0.0.1";        // Сюда впишешь IP или домен хостинга (например, от Render)
        const SERVER_PORT = "3000";           // Сюда порт сервера
        // ========================================================

        const CELL_SIZE = 4;
        const CHUNK_RADIUS = 9;
        const SPEED_WALK = 3.2;
        const SPEED_SPRINT = 5.5;

        let scene, camera, renderer, clock;
        let myId = 'player_' + Math.random().toString(36).substr(2, 9);
        let myName = "Игрок";
        let isPlaying = false;

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isSprinting = false;
        let yaw = 0, pitch = 0;
        const playerPos = new THREE.Vector3(0, 1.5, 0); 
        let playerVelocity = new THREE.Vector3();

        let flashlight, mqttClient, wsClient;
        const spawnedWalls = new Map();
        const remotePlayers = new Map();
        let monsterMesh;
        let monsterSpeed = 2.4;

        let wallTexture, carpetTexture, ceilingTexture;

        function generateExactTextures() {
            const canvasWall = document.createElement('canvas');
            canvasWall.width = 256; canvasWall.height = 256;
            const ctxWall = canvasWall.getContext('2d');
            ctxWall.fillStyle = '#cfbe73'; ctxWall.fillRect(0,0,256,256);
            ctxWall.strokeStyle = '#a69a63'; ctxWall.lineWidth = 1.5;
            for(let x=0; x<=256; x+=32) {
                for(let y=-16; y<=272; y+=24) {
                    ctxWall.beginPath();
                    ctxWall.arc(x + 16, y + 20, 16, Math.PI, 0);
                    ctxWall.stroke();
                }
            }
            wallTexture = new THREE.CanvasTexture(canvasWall);
            wallTexture.wrapS = THREE.RepeatWrapping; wallTexture.wrapT = THREE.RepeatWrapping;

            const canvasCarpet = document.createElement('canvas');
            canvasCarpet.width = 128; canvasCarpet.height = 128;
            const ctxCarpet = canvasCarpet.getContext('2d');
            ctxCarpet.fillStyle = '#9e8e59'; ctxCarpet.fillRect(0,0,128,128);
            for(let i=0; i<4000; i++) {
                ctxCarpet.fillStyle = Math.random() > 0.5 ? '#857747' : '#ad9d68';
                ctxCarpet.fillRect(Math.random()*128, Math.random()*128, 1.5, 1.5);
            }
            carpetTexture = new THREE.CanvasTexture(canvasCarpet);
            carpetTexture.wrapS = THREE.RepeatWrapping; carpetTexture.wrapT = THREE.RepeatWrapping;
            carpetTexture.repeat.set(2, 2);

            const canvasCeil = document.createElement('canvas');
            canvasCeil.width = 128; canvasCeil.height = 128;
            const ctxCeil = canvasCeil.getContext('2d');
            ctxCeil.fillStyle = '#dcdcc5'; ctxCeil.fillRect(0,0,128,128);
            ctxCeil.strokeStyle = '#abab96'; ctxCeil.strokeRect(0,0,128,128);
            ceilingTexture = new THREE.CanvasTexture(canvasCeil);
            ceilingTexture.wrapS = THREE.RepeatWrapping; ceilingTexture.wrapT = THREE.RepeatWrapping;
        }

        function checkStructure(cx, cz) {
            if (Math.abs(cx) <= 1 && Math.abs(cz) <= 1) return false;
            let n1 = Math.sin(cx * 0.5) * Math.cos(cz * 0.5);
            let n2 = Math.cos(cx * 0.2) * Math.sin(cz * 0.2);
            let isWall = false;
            if (Math.abs(cx) % 5 === 0 && n1 > -0.3) isWall = true;
            if (Math.abs(cz) % 5 === 0 && n2 > -0.3) isWall = true;
            if (isWall && Math.sin(cx * 5.1 + cz * 9.2) > 0.3) isWall = false;
            return isWall;
        }

        function init3D() {
            clock = new THREE.Clock();
            generateExactTextures();

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#222013');
            scene.fog = new THREE.FogExp2('#222013', 0.08); 

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.position.copy(playerPos);
            camera.rotation.order = 'YXZ'; 
            scene.add(camera);

            const ambientLight = new THREE.AmbientLight('#a39d6c', 0.8);
            scene.add(ambientLight);

            flashlight = new THREE.SpotLight('#fffbd6', 2.5, 20, Math.PI / 4.5, 0.6, 1.2);
            camera.add(flashlight);
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            document.body.addEventListener('click', () => {
                if(isPlaying) document.body.requestPointerLock();
            });

            createScaryMonster();
        }

        function updateChunks() {
            let pGridX = Math.floor(playerPos.x / CELL_SIZE);
            let pGridZ = Math.floor(playerPos.z / CELL_SIZE);
            const activeKeys = new Set();

            const wallGeo = new THREE.BoxGeometry(CELL_SIZE, 3, CELL_SIZE);
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.7 });
            const floorGeo = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ map: carpetTexture, roughness: 0.9 });
            const ceilGeo = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
            const ceilMat = new THREE.MeshStandardMaterial({ map: ceilingTexture, roughness: 0.4 });
            const lampMat = new THREE.MeshBasicMaterial({ color: '#fffebd' });

            for (let x = pGridX - CHUNK_RADIUS; x <= pGridX + CHUNK_RADIUS; x++) {
                for (let z = pGridZ - CHUNK_RADIUS; z <= pGridZ + CHUNK_RADIUS; z++) {
                    let key = `${x},${z}`;
                    activeKeys.add(key);

                    if (!spawnedWalls.has(key)) {
                        let group = new THREE.Group();

                        let floor = new THREE.Mesh(floorGeo, floorMat);
                        floor.rotation.x = -Math.PI / 2;
                        floor.position.set(x * CELL_SIZE, 0, z * CELL_SIZE);
                        group.add(floor);

                        let isLamp = (Math.abs(x) % 4 === 0 && Math.abs(z) % 4 === 0 && !checkStructure(x,z));
                        let ceilMesh = new THREE.Mesh(ceilGeo, isLamp ? lampMat : ceilMat);
                        if(isLamp) {
                            let lampLight = new THREE.PointLight('#fffaa6', 0.25, 7);
                            lampLight.position.set(0, -0.1, 0);
                            ceilMesh.add(lampLight);
                        }
                        ceilMesh.rotation.x = Math.PI / 2;
                        ceilMesh.position.set(x * CELL_SIZE, 3, z * CELL_SIZE);
                        group.add(ceilMesh);

                        if (checkStructure(x, z)) {
                            let wall = new THREE.Mesh(wallGeo, wallMat);
                            wall.position.set(x * CELL_SIZE, 1.5, z * CELL_SIZE);
                            group.add(wall);
                        }

                        scene.add(group);
                        spawnedWalls.set(key, group);
                    }
                }
            }

            for (let [key, mesh] of spawnedWalls.entries()) {
                if (!activeKeys.has(key)) {
                    scene.remove(mesh);
                    spawnedWalls.delete(key);
                }
            }
        }

        function checkCollision(targetPos) {
            let radius = 0.35;
            let points = [
                {x: targetPos.x - radius, z: targetPos.z - radius},
                {x: targetPos.x + radius, z: targetPos.z - radius},
                {x: targetPos.x - radius, z: targetPos.z + radius},
                {x: targetPos.x + radius, z: targetPos.z + radius}
            ];
            for (let pt of points) {
                if (checkStructure(Math.round(pt.x / CELL_SIZE), Math.round(pt.z / CELL_SIZE))) return true;
            }
            return false;
        }

        function createScaryMonster() {
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: '#030303' });
            
            const spineGeo = new THREE.CylinderGeometry(0.04, 0.04, 2.4);
            const spine = new THREE.Mesh(spineGeo, mat);
            spine.position.y = 1.2;
            group.add(spine);

            for(let i = 0; i < 4; i++) {
                const limbGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.6);
                const limb = new THREE.Mesh(limbGeo, mat);
                limb.position.set(Math.sin(i)*0.2, 1.0, Math.cos(i)*0.2);
                limb.rotation.z = 0.4 * (i % 2 === 0 ? 1 : -1);
                group.add(limb);
            }

            monsterMesh = group;
            monsterMesh.position.set(24, 0, 24);
            scene.add(monsterMesh);
        }

        function updateMonsterLogic(delta) {
            if(!monsterMesh) return;
            let dir = new THREE.Vector3().subVectors(playerPos, monsterMesh.position);
            dir.y = 0;
            let dist = dir.length();

            if (dist < 30) {
                dir.normalize();
                let nextPos = monsterMesh.position.clone().addScaledVector(dir, monsterSpeed * delta);
                
                if (!checkStructure(Math.round(nextPos.x/CELL_SIZE), Math.round(nextPos.z/CELL_SIZE))) {
                    monsterMesh.position.copy(nextPos);
                }
                monsterMesh.lookAt(playerPos.x, monsterMesh.position.y, playerPos.z);

                if (dist < 0.7) triggerJumpscare();
            } else {
                monsterMesh.position.x += Math.sin(clock.getElapsedTime() * 0.2) * 0.01;
            }
        }

        function triggerJumpscare() {
            isPlaying = false;
            document.exitPointerLock();
            document.getElementById('jumpscare').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                playerPos.set(0, 1.5, 0);
                camera.position.copy(playerPos);
                monsterMesh.position.set(20 + Math.random()*20, 0, 20 + Math.random()*20);
                isPlaying = true;
                document.body.requestPointerLock();
            }, 2000);
        }

        // Рендер чужих игроков-капсул
        function syncRemotePlayer(data) {
            if (data.id === myId) return;
            if (!remotePlayers.has(data.id)) {
                const capGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.6, 8);
                const capMat = new THREE.MeshStandardMaterial({ color: '#900000', roughness: 0.5 });
                const mesh = new THREE.Mesh(capGeo, capMat);
                scene.add(mesh);
                remotePlayers.set(data.id, { mesh: mesh, lastSeen: Date.now() });
            } else {
                let rData = remotePlayers.get(data.id);
                rData.mesh.position.set(data.x, data.y - 0.4, data.z);
                rData.lastSeen = Date.now();
            }
        }

        // --- ВАРИАНТ 1: Глобальный MQTT (Дефолт) ---
        function initGlobalMultiplayer() {
            document.getElementById('srv-ip').innerText = "HiveMQ Broker";
            document.getElementById('srv-port = ""').innerText = "WSS (Public)";
            
            const brokerUri = "wss://broker.hivemq.com:8884/mqtt"; 
            mqttClient = new Paho.MQTT.Client(brokerUri, "sub_back_" + Math.random().toString(36).substr(2, 5));

            mqttClient.onMessageArrived = (message) => {
                try {
                    let data = JSON.parse(message.payloadString);
                    syncRemotePlayer(data);
                } catch(e){}
            };

            mqttClient.connect({
                onSuccess: () => {
                    document.getElementById('srv-status').innerText = "CONNECTED (MQTT)";
                    document.getElementById('srv-status').style.color = "#6c5";
                    mqttClient.subscribe("backrooms/level0/global_game_v2");
                    setInterval(() => {
                        if (!isPlaying) return;
                        let msg = new Paho.MQTT.Message(JSON.stringify({
                            type: 'move', id: myId, name: myName, x: playerPos.x, y: playerPos.y, z: playerPos.z
                        }));
                        msg.destinationName = "backrooms/level0/global_game_v2";
                        mqttClient.send(msg);
                    }, 50);
                },
                useSSL: true
            });
        }

        // --- ВАРИАНТ 2: Твой будущий Node.js Сервер через WebSockets ---
        function initNodeServer() {
            document.getElementById('srv-ip').innerText = SERVER_IP;
            document.getElementById('srv-port').innerText = SERVER_PORT;
            document.getElementById('srv-status').innerText = "CONNECTING...";
            document.getElementById('srv-status').style.color = "#eedc82";

            const url = (SERVER_IP.startsWith('http') || SERVER_IP.includes('render')) 
                ? `wss://${SERVER_IP.replace('https://','').replace('http://','')}` 
                : `ws://${SERVER_IP}:${SERVER_PORT}`;

            wsClient = new WebSocket(url);

            wsClient.onopen = () => {
                document.getElementById('srv-status').innerText = "ONLINE (NODE)";
                document.getElementById('srv-status').style.color = "#6c5";
                
                setInterval(() => {
                    if (wsClient.readyState === WebSocket.OPEN && isPlaying) {
                        wsClient.send(JSON.stringify({
                            type: 'move', id: myId, name: myName, x: playerPos.x, y: playerPos.y, z: playerPos.z
                        }));
                    }
                }, 50);
            };

            wsClient.onmessage = (event) => {
                try {
                    let data = JSON.parse(event.data);
                    if(Array.isArray(data)) {
                        data.forEach(p => syncRemotePlayer(p));
                    } else {
                        syncRemotePlayer(data);
                    }
                } catch(e){}
            };

            wsClient.onerror = () => {
                document.getElementById('srv-status').innerText = "ERR / OFFLINE";
                document.getElementById('srv-status').style.color = "#ff4d4d";
            };
        }

        // Очистка неактивных игроков
        setInterval(() => {
            let now = Date.now();
            for (let [id, data] of remotePlayers.entries()) {
                if (now - data.lastSeen > 3000) {
                    scene.remove(data.mesh);
                    remotePlayers.delete(id);
                }
            }
            document.getElementById('online-count').innerText = "В игре: " + (remotePlayers.size + 1);
        }, 2000);

        function startAmbientSound() {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                let filter = ctx.createBiquadFilter();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(55, ctx.currentTime);
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(120, ctx.currentTime);
                gain.gain.setValueAtTime(0.03, ctx.currentTime);
                osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
                osc.start();
            }catch(e){}
        }

        function onKeyDown(e) {
            if(!isPlaying) return;
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
            if (e.code === 'ShiftLeft') isSprinting = true;
            if (e.code === 'KeyF') flashlight.visible = !flashlight.visible;
        }

        function onKeyUp(e) {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
            if (e.code === 'ShiftLeft') isSprinting = false;
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body) return;
            yaw -= e.movementX * 0.0022;
            pitch -= e.movementY * 0.0022;
            pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            let name = document.getElementById('nickname-input').value.trim();
            if(name) myName = name;
            document.getElementById('player-name').innerText = "Игрок: " + myName;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('server-info').style.display = 'block'; // Показываем IP блок
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            
            isPlaying = true;
            document.body.requestPointerLock();
            
            startAmbientSound();
            
            // Проверка: какой бэкенд использовать
            if (USE_NODE_SERVER) {
                initNodeServer();
            } else {
                initGlobalMultiplayer();
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            if (delta > 0.1) delta = 0.1;

            if (isPlaying) {
                let speed = isSprinting ? SPEED_SPRINT : SPEED_WALK;
                playerVelocity.set(0, 0, 0);

                let forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                if (moveForward) playerVelocity.add(forward);
                if (moveBackward) playerVelocity.add(forward.clone().negate());
                if (moveRight) playerVelocity.add(right);
                if (moveLeft) playerVelocity.add(right.clone().negate());

                if (playerVelocity.lengthSq() > 0) {
                    playerVelocity.normalize().multiplyScalar(speed * delta);
                    
                    let nextX = playerPos.clone(); nextX.x += playerVelocity.x;
                    if (!checkCollision(nextX)) playerPos.x = nextX.x;

                    let nextZ = playerPos.clone(); nextZ.z += playerVelocity.z;
                    if (!checkCollision(nextZ)) playerPos.z = nextZ.z;
                }

                camera.position.copy(playerPos);
                updateChunks();
                updateMonsterLogic(delta);
            }

            renderer.render(scene, camera);
        }

        init3D();
        animate();
    </script>
</body>
</html>
