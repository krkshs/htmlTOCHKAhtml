<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Lost in JavaScript</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Эффект VHS помех */
        #vhs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Главное меню */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1913;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #d1c28a;
            text-align: center;
        }

        #menu h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            letter-spacing: 5px;
            color: #f1e4a3;
            text-shadow: 3px 3px 0px #000;
        }

        #menu p {
            font-size: 1rem;
            margin-bottom: 30px;
            color: #8a8158;
        }

        .input-group {
            margin-bottom: 20px;
        }

        #nickname-input {
            background: #2b291f;
            border: 2px solid #54503d;
            padding: 12px 20px;
            font-size: 1.2rem;
            color: #fff;
            outline: none;
            text-align: center;
            border-radius: 4px;
            font-family: inherit;
        }

        #nickname-input:focus {
            border-color: #d1c28a;
        }

        #start-btn {
            background: #d1c28a;
            color: #1a1913;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 0px #8a8158;
        }

        #start-btn:hover {
            background: #f1e4a3;
            transform: translateY(-2px);
            box-shadow: 0 6px 0px #8a8158;
        }

        #start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #8a8158;
        }

        /* Интерфейс внутри игры */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            color: #e2d69a;
            font-size: 1rem;
            pointer-events: none;
            display: none;
            text-shadow: 1px 1px 2px #000;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(217, 201, 131, 0.6);
            font-size: 0.9rem;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            display: none;
        }

        /* Скример */
        #jumpscare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            color: red;
            font-size: 5rem;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="vhs-overlay"></div>

    <div id="menu">
        <h1>THE BACKROOMS</h1>
        <p>Уровень 0 • Бесконечный архив монотонности</p>
        <div class="input-group">
            <input type="text" id="nickname-input" placeholder="Введите ваш ник" maxlength="12" value="Игрок">
        </div>
        <button id="start-btn">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="hud">
        <div id="player-name">Игрок: Unknown</div>
        <div id="online-count">В сети на этой машине: 1</div>
    </div>

    <div id="crosshair"></div>
    <div id="instructions">WASD — Движение | SHIFT — Бег | F — Фонарик | Мышь — Обзор (Клик для захвата)</div>
    
    <div id="jumpscare">ВЫ ПОЙМАНЫ</div>
    <div id="canvas-container"></div>

    <script>
        // --- Настройки игры ---
        const CELL_SIZE = 4; // Размер одного блока лабиринта в метрах
        const CHUNK_RADIUS = 8; // Радиус прорисовки блоков вокруг игрока
        const SPEED_WALK = 3.5;
        const SPEED_SPRINT = 6.0;
        
        let scene, camera, renderer, clock;
        let myId = '_' + Math.random().toString(36).substr(2, 9);
        let myName = "Игрок";
        let isPlaying = false;

        // Физика и управление
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isSprinting = false;
        let yaw = 0, pitch = 0;
        const playerPos = new THREE.Vector3(0, 1.6, 0); // Спавн в центре (0,0)
        let playerVelocity = new THREE.Vector3();
        let flashlight, ambientBuzz;
        
        // Списки объектов
        const spawnedWalls = new Map(); // Кэш чанков стен key -> mesh
        const remotePlayers = new Map(); // Другие игроки (капсулы)
        const monsters = [];

        // Канал мультиплеера между вкладками
        const mpChannel = new BroadcastChannel('backrooms_mp_channel');

        // Текстуры, созданные на HTML Canvas (Генерация на лету)
        let wallTexture, carpetTexture, ceilingTexture;

        // --- Генерация процедурных текстур ---
        function generateTextures() {
            // 1. Обои стен (Желтоватые с вертикальными узорами, как на фото)
            const canvasWall = document.createElement('canvas');
            canvasWall.width = 256; canvasWall.height = 256;
            const ctxWall = canvasWall.getContext('2d');
            ctxWall.fillStyle = '#cfbe7c'; ctxWall.fillRect(0,0,256,256);
            ctxWall.strokeStyle = '#b0a060'; ctxWall.lineWidth = 2;
            for(let i=0; i<256; i+=32) {
                ctxWall.beginPath();
                for(let y=0; y<=256; y+=10) {
                    let xOff = Math.sin(y*0.1) * 3;
                    ctxWall.lineTo(i + 16 + xOff, y);
                }
                ctxWall.stroke();
            }
            wallTexture = new THREE.CanvasTexture(canvasWall);
            wallTexture.wrapS = THREE.RepeatWrapping; wallTexture.wrapT = THREE.RepeatWrapping;

            // 2. Ковер (Грязный, мокрый ворс)
            const canvasCarpet = document.createElement('canvas');
            canvasCarpet.width = 128; canvasCarpet.height = 128;
            const ctxCarpet = canvasCarpet.getContext('2d');
            ctxCarpet.fillStyle = '#a69663'; ctxCarpet.fillRect(0,0,128,128);
            for(let i=0; i<3000; i++) {
                ctxCarpet.fillStyle = Math.random() > 0.5 ? '#8f8152' : '#b8a974';
                ctxCarpet.fillRect(Math.random()*128, Math.random()*128, 2, 2);
            }
            carpetTexture = new THREE.CanvasTexture(canvasCarpet);
            carpetTexture.wrapS = THREE.RepeatWrapping; carpetTexture.wrapT = THREE.RepeatWrapping;
            carpetTexture.repeat.set(2, 2);

            // 3. Потолок (Плиты со структурами)
            const canvasCeil = document.createElement('canvas');
            canvasCeil.width = 256; canvasCeil.height = 256;
            const ctxCeil = canvasCeil.getContext('2d');
            ctxCeil.fillStyle = '#dfdfcf'; ctxCeil.fillRect(0,0,256,256);
            ctxCeil.strokeStyle = '#b0b0a0'; ctxCeil.strokeRect(0,0,256,256);
            for(let i=0; i<500; i++) {
                ctxCeil.fillStyle = 'rgba(0,0,0,0.05)';
                ctxCeil.fillRect(Math.random()*256, Math.random()*256, 3, 3);
            }
            ceilingTexture = new THREE.CanvasTexture(canvasCeil);
            ceilingTexture.wrapS = THREE.RepeatWrapping; ceilingTexture.wrapT = THREE.RepeatWrapping;
        }

        // --- Псевдослучайный бесконечный лабиринт (Minecraft-style алгоритм) ---
        // Возвращает true, если на этих координатах сетки должна стоять стена
        function checkStructure(cx, cz) {
            if (Math.abs(cx) <= 1 && Math.abs(cz) <= 1) return false; // Безопасная зона спавна
            
            // Генерация бесконечных длинных коридоров и комнат с помощью тригонометрии
            let noiseH1 = Math.sin(cx * 0.4) * Math.cos(cz * 0.4);
            let noiseH2 = Math.cos(cx * 0.1) * Math.sin(cz * 0.1);
            
            // Создаем сетку пересекающихся стен
            let isWall = false;
            if (Math.abs(cx) % 6 === 0 && noiseH1 > -0.2) isWall = true;
            if (Math.abs(cz) % 6 === 0 && noiseH2 > -0.2) isWall = true;
            
            // Случайные проходы (двери) в стенах, чтобы не запереть игрока
            if (isWall) {
                let doorCheck = Math.sin(cx * 12.3 + cz * 37.7);
                if (doorCheck > 0.4) isWall = false;
            }
            
            return isWall;
        }

        // --- Инициализация сцены Three.js ---
        function init() {
            clock = new THREE.Clock();
            generateTextures();

            // Сцена и камера
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#14130e');
            scene.fog = new THREE.FogExp2('#14130e', 0.09); // Густой пугающий туман

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(playerPos);
            scene.add(camera);

            // Освещение: Общий тусклый свет уровня
            const ambientLight = new THREE.AmbientLight('#2c2a1e', 0.6);
            scene.add(ambientLight);

            // Фонарик игрока (Тот самый крутой интерактивный элемент)
            flashlight = new THREE.SpotLight('#ffeaa7', 2, 25, Math.PI / 4, 0.5, 1);
            flashlight.position.set(0, 0, 0);
            flashlight.castShadow = false;
            camera.add(flashlight);
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: false }); // Отключаем сглаживание для олдскульного вида
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Слушатели управления
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            // Клик по экрану блокирует курсор мыши
            document.body.addEventListener('click', () => {
                if(isPlaying) document.body.requestPointerLock();
            });

            // Создаем монстров вокруг
            spawnMonsters();
        }

        // --- Логика генерации мира вокруг игрока (Оптимизация чанков) ---
        function updateInfiniteMaze() {
            let pGridX = Math.floor(playerPos.x / CELL_SIZE);
            let pGridZ = Math.floor(playerPos.z / CELL_SIZE);

            const activeKeys = new Set();

            const wallGeo = new THREE.BoxGeometry(CELL_SIZE, 3, CELL_SIZE);
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.8 });

            const floorGeo = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ map: carpetTexture, roughness: 0.9 });

            const ceilGeo = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
            const ceilMat = new THREE.MeshStandardMaterial({ map: ceilingTexture, roughness: 0.5 });
            // Материал для светящихся ламп
            const lampMat = new THREE.MeshBasicMaterial({ color: '#fffebd' });

            // Пробегаем по видимой области вокруг игрока
            for (let x = pGridX - CHUNK_RADIUS; x <= pGridX + CHUNK_RADIUS; x++) {
                for (let z = pGridZ - CHUNK_RADIUS; z <= pGridZ + CHUNK_RADIUS; z++) {
                    let key = `${x},${z}`;
                    activeKeys.add(key);

                    if (!spawnedWalls.has(key)) {
                        let group = new THREE.Group();

                        // 1. Пол
                        let floor = new THREE.Mesh(floorGeo, floorMat);
                        floor.rotation.x = -Math.PI / 2;
                        floor.position.set(x * CELL_SIZE, 0, z * CELL_SIZE);
                        group.add(floor);

                        // 2. Потолок или Лампа
                        let isLamp = (Math.abs(x) % 3 === 0 && Math.abs(z) % 3 === 0 && !checkStructure(x,z));
                        let ceilMesh;
                        if (isLamp) {
                            ceilMesh = new THREE.Mesh(ceilGeo, lampMat);
                            // Добавим точечный свет от ламп для реалистичности
                            if(Math.random() > 0.3) { // Немного рандома, чтобы не перегружать GPU
                                let lampLight = new THREE.PointLight('#ffeaa7', 0.2, 8);
                                lampLight.position.set(0, -0.1, 0);
                                ceilMesh.add(lampLight);
                            }
                        } else {
                            ceilMesh = new THREE.Mesh(ceilGeo, ceilMat);
                        }
                        ceilMesh.rotation.x = Math.PI / 2;
                        ceilMesh.position.set(x * CELL_SIZE, 3, z * CELL_SIZE);
                        group.add(ceilMesh);

                        // 3. Стена (если есть структура)
                        if (checkStructure(x, z)) {
                            let wall = new THREE.Mesh(wallGeo, wallMat);
                            wall.position.set(x * CELL_SIZE, 1.5, z * CELL_SIZE);
                            group.add(wall);
                        }

                        scene.add(group);
                        spawnedWalls.set(key, group);
                    }
                }
            }

            // Удаляем старые чанки, которые далеко, для идеальной оптимизации
            for (let [key, mesh] of spawnedWalls.entries()) {
                if (!activeKeys.has(key)) {
                    scene.remove(mesh);
                    spawnedWalls.delete(key);
                }
            }
        }

        // --- Реалистичный синтез звука (Web Audio API) ---
        function startAmbientAudio() {
            try {
                let AudioContext = window.AudioContext || window.webkitAudioContext;
                let audioCtx = new AudioContext();

                // Низкочастотный гул ламп (60 Гц + 120 Гц гармоники)
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(150, audioCtx.currentTime);

                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); // Очень тихий фон

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
            } catch(e) {
                console.log("Аудио контекст не поддерживается блокировкой браузера.");
            }
        }

        // --- Обработка коллизий (Minecraft-стиль скольжения по стенам) ---
        function checkCollision(targetPos) {
            let buffer = 0.4; // Радиус физического тела игрока
            let checkPoints = [
                {x: targetPos.x - buffer, z: targetPos.z - buffer},
                {x: targetPos.x + buffer, z: targetPos.z - buffer},
                {x: targetPos.x - buffer, z: targetPos.z + buffer},
                {x: targetPos.x + buffer, z: targetPos.z + buffer}
            ];

            for (let pt of checkPoints) {
                let gx = Math.round(pt.x / CELL_SIZE);
                let gz = Math.round(pt.z / CELL_SIZE);
                if (checkStructure(gx, gz)) {
                    return true; // Столкновение со стеной!
                }
            }
            return false;
        }

        // --- Управление клавиатурой и мышью ---
        function onKeyDown(e) {
            if(!isPlaying) return;
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'ShiftLeft': isSprinting = true; break;
                case 'KeyF': // Включение / Выключение фонарика
                    flashlight.visible = !flashlight.visible;
                    break;
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            const inputName = document.getElementById('nickname-input').value.trim();
            if(inputName) myName = inputName;
            document.getElementById('player-name').innerText = "Игрок: " + myName;

            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            
            isPlaying = true;
            document.body.requestPointerLock();
            
            // Запуск аудио
            startAmbientAudio();
        });

        function onKeyUp(e) {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
                case 'ShiftLeft': isSprinting = false; break;
            }
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body) return;
            
            yaw -= e.movementX * 0.0025;
            pitch -= e.movementY * 0.0025;
            
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            
            camera.rotation.set(0, 0, 0);
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Физика монстров (Враждебные сущности) ---
        function spawnMonsters() {
            // Создаем 3-х жутких монстров (Сущностей)
            const monsterMat = new THREE.MeshBasicMaterial({ color: '#0a0a0a' }); // Черные силуэты
            const bodyGeo = new THREE.CylinderGeometry(0.2, 0.05, 2.2, 6);

            for(let i=0; i<4; i++) {
                let m = new THREE.Mesh(bodyGeo, monsterMat);
                // Спавним их на некотором расстоянии от центра
                let angle = Math.random() * Math.PI * 2;
                let dist = 15 + Math.random() * 20;
                m.position.set(Math.cos(angle)*dist, 1.1, Math.sin(angle)*dist);
                scene.add(m);
                monsters.push(m);
            }
        }

        function updateMonsters(delta) {
            monsters.forEach(m => {
                // Вектор к игроку
                let dir = new THREE.Vector3().subVectors(playerPos, m.position);
                dir.y = 0;
                let dist = dir.length();

                // Если игрок близко, монстр медленно и жутко идет на него
                if (dist < 22) {
                    dir.normalize();
                    let speed = 2.0; // Скорость монстра
                    let nextPos = m.position.clone().addScaledVector(dir, speed * delta);
                    
                    // Проверка коллизий монстра со стенами
                    let gx = Math.round(nextPos.x / CELL_SIZE);
                    let gz = Math.round(nextPos.z / CELL_SIZE);
                    if (!checkStructure(gx, gz)) {
                        m.position.copy(nextPos);
                    }

                    // Скример при касании
                    if (dist < 0.8) {
                        triggerJumpscare();
                    }
                }
            });
        }

        function triggerJumpscare() {
            isPlaying = false;
            document.exitPointerLock();
            const js = document.getElementById('jumpscare');
            js.style.display = 'flex';
            setTimeout(() => {
                js.style.display = 'none';
                // Респавн в центр
                playerPos.set(0, 1.6, 0);
                camera.position.copy(playerPos);
                isPlaying = true;
                document.body.requestPointerLock();
            }, 1500);
        }

        // --- Реализация мультиплеера (Вкладки / Окна) ---
        // Отправка наших координат другим игрокам
        setInterval(() => {
            if (!isPlaying) return;
            mpChannel.postMessage({
                type: 'update',
                id: myId,
                name: myName,
                pos: { x: playerPos.x, y: playerPos.y, z: playerPos.z }
            });
        }, 40); // 25 FPS синхронизация пакетов

        // Слушаем чужие пакеты
        mpChannel.onmessage = (e) => {
            if (e.data.type === 'update') {
                let pId = e.data.id;
                if (pId === myId) return;

                if (!remotePlayers.has(pId)) {
                    // Создаем 3D-модель игрока в виде капсулы
                    const capGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.6, 8);
                    const capMat = new THREE.MeshStandardMaterial({ color: '#ff7675', roughness: 0.5 }); // Розовая капсула
                    const mesh = new THREE.Mesh(capGeo, capMat);
                    mesh.position.set(e.data.pos.x, e.data.pos.y, e.data.pos.z);
                    scene.add(mesh);

                    remotePlayers.set(pId, {
                        mesh: mesh,
                        lastUpdate: Date.now()
                    });
                } else {
                    let pData = remotePlayers.get(pId);
                    pData.mesh.position.set(e.data.pos.x, e.data.pos.y - 0.4, e.data.pos.z); // Коррекция высоты
                    pData.lastUpdate = Date.now();
                }

                // Обновляем счетчик онлайна на странице
                document.getElementById('online-count').innerText = "В сети на этой машине: " + (remotePlayers.size + 1);
            }
        };

        // Удаление отключившихся (неактивных) игроков
        function cleanDeadPlayers() {
            let now = Date.now();
            for (let [id, data] of remotePlayers.entries()) {
                if (now - data.lastUpdate > 2000) { // Если нет вестей 2 секунды
                    scene.remove(data.mesh);
                    remotePlayers.delete(id);
                }
            }
            document.getElementById('online-count').innerText = "В сети на этой машине: " + (remotePlayers.size + 1);
        }
        setInterval(cleanDeadPlayers, 3000);

        // Имитация ботов, если игрок один (Для теста)
        let botSpawned = false;
        function spawnSimulatedBots() {
            if(remotePlayers.size === 0 && !botSpawned) {
                botSpawned = true;
                // Каждые пару секунд шлем фейковые движения ботов-капсул
                setInterval(() => {
                    if(remotePlayers.size === 0) {
                        let t = Date.now() * 0.001;
                        mpChannel.postMessage({
                            type: 'update', id: 'bot_1', name: 'Симуляция_Капсула',
                            pos: { x: Math.sin(t)*8 + 4, y: 1.6, z: Math.cos(t)*8 + 4 }
                        });
                    }
                }, 50);
            }
        }
        setTimeout(spawnSimulatedBots, 5000);


        // --- Основной Игровой Цикл (Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            let delta = clock.getDelta();
            // Ограничение слишком больших скачков кадров
            if (delta > 0.1) delta = 0.1; 

            if (isPlaying) {
                // 1. Движение и Скорость
                let currentSpeed = isSprinting ? SPEED_SPRINT : SPEED_WALK;
                playerVelocity.set(0, 0, 0);

                // Направление движения относительно взгляда камеры
                let forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                if (moveForward) playerVelocity.add(forward);
                if (moveBackward) playerVelocity.add(forward.clone().negate());
                if (moveRight) playerVelocity.add(right);
                if (moveLeft) playerVelocity.add(right.clone().negate());

                if (playerVelocity.lengthSq() > 0) {
                    playerVelocity.normalize().multiplyScalar(currentSpeed * delta);
                    
                    // Покомпонентная проверка коллизий для плавного скольжения по стенам
                    let nextX = playerPos.clone(); nextX.x += playerVelocity.x;
                    if (!checkCollision(nextX)) playerPos.x = nextX.x;

                    let nextZ = playerPos.clone(); nextZ.z += playerVelocity.z;
                    if (!checkCollision(nextZ)) playerPos.z = nextZ.z;
                }

                // Обновляем позицию камеры
                camera.position.copy(playerPos);

                // 2. Генерация карты вокруг игрока
                updateInfiniteMaze();

                // 3. Обновление монстров
                updateMonsters(delta);
            }

            renderer.render(scene, camera);
        }

        // Запуск
        init();
        animate();

    </script>
</body>
</html>
