<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Voice & Screen Chat</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-card: #313338;
            --bg-input: #1e1f22;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --danger: #f23f43;
            --success: #23a55a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            overflow: hidden;
        }

        /* Окно авторизации */
        #login-screen {
            position: absolute; width: 100%; height: 100%;
            background-color: var(--bg-main); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-box {
            background-color: var(--bg-sidebar); padding: 40px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center; width: 320px;
        }
        .login-box h2 { margin-top: 0; color: #fff; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; border: none; background-color: var(--bg-input);
            color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 1rem;
            margin-bottom: 20px; outline: none; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; border: none; background-color: var(--accent);
            color: #fff; font-size: 1rem; font-weight: bold; border-radius: 4px;
            cursor: pointer; transition: background 0.2s;
        }
        .login-box button:hover { background-color: var(--accent-hover); }

        /* Главный интерфейс */
        #app-container {
            display: flex; width: 100%; height: 100%; display: none;
        }

        /* Боковая панель (Пользователи и Кнопки управления) */
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column; justify-content: space-between;
            border-right: 1px solid rgba(0,0,0,0.2);
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; color: #fff; }
        .user-list { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .user-item {
            display: flex; align-items: center; padding: 8px 10px;
            margin-bottom: 5px; border-radius: 4px; background: rgba(255,255,255,0.03);
        }
        .user-avatar {
            width: 32px; height: 32px; background-color: var(--accent);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-weight: bold; color: #fff; margin-right: 10px;
        }
        .user-info { flex-grow: 1; font-size: 0.95rem; }
        .user-status-icons { display: flex; gap: 5px; }
        .status-icon { width: 16px; height: 16px; opacity: 0.6; }

        /* Кнопки управления (Микро, Звук, Демка) */
        .controls-panel {
            padding: 15px; background-color: rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn-group { display: flex; gap: 8px; }
        .control-btn {
            flex: 1; padding: 10px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; display: flex; justify-content: center;
            align-items: center; gap: 5px; font-size: 0.85rem; transition: background 0.2s;
            color: #fff; background-color: #4e5058;
        }
        .control-btn:hover { background-color: #6d6f78; }
        .control-btn.active { background-color: var(--success); }
        .control-btn.active:hover { background-color: #1a8144; }
        .control-btn.danger { background-color: var(--danger); }
        .control-btn.danger:hover { background-color: #bc3135; }

        /* Центральная рабочая зона */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; background-color: var(--bg-main);
        }

        /* Сетка стримов и говорящих */
        .streams-grid {
            flex-grow: 1; padding: 20px; display: flex; flex-wrap: wrap;
            gap: 15px; overflow-y: auto; align-content: flex-start;
        }
        .peer-card {
            background-color: var(--bg-card); border-radius: 8px;
            width: 240px; height: 160px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid transparent;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        /* Подсветка говорящего */
        .peer-card.speaking {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(35, 165, 90, 0.4);
        }
        .peer-card .avatar-big {
            width: 64px; height: 64px; background-color: var(--accent);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 1.5rem; font-weight: bold; color: #fff;
            margin-bottom: 10px;
        }
        .peer-card .name { font-weight: bold; font-size: 1rem; color: #fff; }
        .peer-card .mic-indicator {
            position: absolute; bottom: 10px; right: 10px;
            font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px;
        }

        /* Большое окно для Демонстрации Экрана (Демки) */
        #screen-share-area {
            height: 50%; background-color: #000; display: none;
            position: relative; border-bottom: 2px solid rgba(0,0,0,0.3);
        }
        #screen-video { width: 100%; height: 100%; object-fit: contain; }
        .screen-label {
            position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7);
            padding: 5px 12px; border-radius: 4px; font-size: 0.9rem; font-weight: bold;
        }

        /* Текстовый чат снизу */
        .chat-area {
            height: 200px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column; border-top: 1px solid rgba(0,0,0,0.2);
        }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.95rem; }
        .msg { margin-bottom: 6px; line-height: 1.3; }
        .msg-author { font-weight: bold; color: var(--accent); margin-right: 5px; }
        .chat-input-wrapper { padding: 10px 15px; display: flex; gap: 10px; }
        .chat-input-wrapper input {
            flex-grow: 1; padding: 10px; border: none; background-color: var(--bg-input);
            color: #fff; border-radius: 4px; outline: none; font-family: inherit;
        }
        .chat-input-wrapper button {
            padding: 10px 20px; border: none; background-color: var(--accent);
            color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        .chat-input-wrapper button:hover { background-color: var(--accent-hover); }
    </style>
    <!-- Подключаем MQTT клиент Paho для обмена WebRTC сигналом напрямую на GitHub Pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>

    <!-- Окно логина -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Войс Чат & Демка</h2>
            <input type="text" id="nickname-input" placeholder="Введите ваш ник" maxlength="14" value="Пользователь">
            <button id="join-btn">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <!-- Основное окно -->
    <div id="app-container">
        <!-- Левый сайдбар -->
        <div class="sidebar">
            <div>
                <div class="sidebar-header">
                    <h3>В сети комнаты:</h3>
                </div>
                <div class="user-list" id="users-container">
                    <!-- Сюда добавляются юзеры динамически -->
                </div>
            </div>

            <!-- Нижняя панель с кнопками мута, демки и тд -->
            <div class="controls-panel">
                <div class="btn-group">
                    <button class="control-btn active" id="toggle-mic-btn">🎙 Микро</button>
                    <button class="control-btn active" id="toggle-audio-btn">🔊 Звук</button>
                </div>
                <button class="control-btn" id="share-screen-btn">🖥 Включить демку</button>
                <button class="control-btn danger" id="leave-btn">Отключиться</button>
            </div>
        </div>

        <!-- Центральный контент -->
        <div class="main-content">
            <!-- Зона стрима/демки экрана -->
            <div id="screen-share-area">
                <video id="screen-video" autoplay playsinline muted></video>
                <div class="screen-label" id="screen-user-label">Демонстрация экрана: Никто</div>
            </div>

            <!-- Сетка голосовых карточек участников -->
            <div class="streams-grid" id="cards-container">
                <!-- Карточки участников -->
            </div>

            <!-- Текстовый чат -->
            <div class="chat-area">
                <div class="chat-messages" id="chat-msg-container">
                    <div class="msg"><span class="msg-author">Система:</span>Добро пожаловать в голосовой чат!</div>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Написать сообщение друзьям..." maxlength="150">
                    <button id="chat-send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация WebRTC и брокера сигналов
        const MQTT_BROKER = "broker.hivemq.com";
        const MQTT_PORT = 8884;
        const TOPIC_ROOM = "krkshs/voicechat/global_room_v3"; // Уникальная комната для вас
        
        // Бесплатные STUN-сервера от Google для пробития NAT и прямого коннекта (P2P)
        const rtcConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        };

        let myId = "usr_" + Math.random().toString(36).substr(2, 9);
        let myName = "Аноним";
        let mqttClient;
        
        let localAudioStream = null;
        let localScreenStream = null;
        
        let micEnabled = true;
        let audioEnabled = true;
        let isSharingScreen = false;

        const peers = new Map(); // Хранилище всех активных P2P соединений

        // Элементы интерфейса
        const loginScreen = document.getElementById("login-screen");
        const appContainer = document.getElementById("app-container");
        const nicknameInput = document.getElementById("nickname-input");
        const usersContainer = document.getElementById("users-container");
        const cardsContainer = document.getElementById("cards-container");
        const chatMsgContainer = document.getElementById("chat-msg-container");
        const chatInput = document.getElementById("chat-input");

        // --- 1. АВТОРИЗАЦИЯ И СТАРТ ПОТОКОВ ---
        document.getElementById("join-btn").addEventListener("click", async () => {
            if (nicknameInput.value.trim() !== "") {
                myName = nicknameInput.value.trim();
            }

            // Запрашиваем доступ к микрофону
            try {
                localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert("Ошибка доступа к микрофону! Без него голосовой чат не запустится. Убедитесь, что дали разрешение в браузере.");
                return;
            }

            loginScreen.style.display = "none";
            appContainer.style.display = "flex";

            // Отрисовываем себя в списке
            updateLocalUserCard();

            // Подключаем обмен WebRTC пирами через MQTT
            initSignaling();
        </script>
        <!-- Разделяем скрипт, чтобы не перегружать парсер -->
        <script>
        // --- 2. СИГНАЛИНГ СЕРВЕР (ОБМЕН РУКОПОЖАТИЯМИ ЧЕРЕЗ MQTT) ---
        function initSignaling() {
            mqttClient = new Paho.MQTT.Client(`wss://${MQTT_BROKER}:${MQTT_PORT}/mqtt`, "client_" + myId);

            mqttClient.onMessageArrived = async (message) => {
                try {
                    const data = JSON.parse(message.payloadString);
                    if (data.senderId === myId) return; // Игнорируем свои же пакеты

                    // Логика текстового чата
                    if (data.type === "chat") {
                        appendChatMessage(data.senderName, data.text);
                        return;
                    }

                    // Логика отключения кого-то
                    if (data.type === "leave") {
                        removePeer(data.senderId);
                        return;
                    }

                    // Обработка статусов микрофона друзей
                    if (data.type === "status_update") {
                        const peer = peers.get(data.senderId);
                        if (peer) {
                            peer.micEnabled = data.micEnabled;
                            document.getElementById(`mic-status-${data.senderId}`).innerText = data.micEnabled ? "🎙 Вкл" : "🚫 Мут";
                        }
                        return;
                    }

                    // Логика WebRTC хэндшейка
                    if (data.type === "join") {
                        // Новый юзер зашел! Создаем для него соединение и отправляем Offer
                        await createPeerConnection(data.senderId, data.senderName, true);
                    } else if (data.targetId === myId) {
                        if (data.type === "offer") {
                            await createPeerConnection(data.senderId, data.senderName, false);
                            const peer = peers.get(data.senderId);
                            await peer.pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                            const answer = await peer.pc.createAnswer();
                            await peer.pc.setLocalDescription(answer);
                            
                            sendSignal({ type: "answer", targetId: data.senderId, sdp: answer });
                        } else if (data.type === "answer") {
                            const peer = peers.get(data.senderId);
                            if (peer) {
                                await peer.pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                            }
                        } else if (data.type === "candidate") {
                            const peer = peers.get(data.senderId);
                            if (peer && data.candidate) {
                                try {
                                    await peer.pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                                } catch(e){}
                            }
                        }
                    }
                } catch (e) { console.error(e); }
            };

            mqttClient.connect({
                onSuccess: () => {
                    mqttClient.subscribe(TOPIC_ROOM);
                    // Оповещаем всех в комнате, что мы зашли
                    sendSignal({ type: "join", senderName: myName });
                },
                useSSL: true
            });
        }

        function sendSignal(payload) {
            payload.senderId = myId;
            payload.senderName = myName;
            const message = new Paho.MQTT.Message(JSON.stringify(payload));
            message.destinationName = TOPIC_ROOM;
            if(mqttClient && mqttClient.isConnected()) mqttClient.send(message);
        }

        // --- 3. СОЗДАНИЕ НАСТОЯЩЕГО P2P КОННЕКТА (WebRTC) ---
        async function createPeerConnection(peerId, peerName, isOffer) {
            if (peers.has(peerId)) return;

            const pc = new RTCPeerConnection(rtcConfig);
            const peerInfo = { pc: pc, name: peerName, micEnabled: true, stream: null };
            peers.set(peerId, peerInfo);

            // Добавляем наш локальный звук в это P2P соединение
            localAudioStream.getTracks().forEach(track => {
                pc.addTrack(track, localAudioStream);
            });

            // Если у нас активна демка экрана — добавляем и её трек тоже
            if (localScreenStream) {
                localScreenStream.getTracks().forEach(track => {
                    pc.addTrack(track, localScreenStream);
                });
            }

            // Обмен сетевыми путями (ICE Candidates)
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal({ type: "candidate", targetId: peerId, candidate: event.candidate });
                }
            };

            // Пришел медиапоток от друга!
            pc.ontrack = (event) => {
                const remoteStream = event.streams[0];
                
                // Проверяем тип трека (аудио или видео демка)
                if (event.track.kind === "audio") {
                    if (!document.getElementById(`audio-${peerId}`)) {
                        const audioEl = document.createElement("audio");
                        audioEl.id = `audio-${peerId}`;
                        audioEl.srcObject = remoteStream;
                        audioEl.autoplay = true;
                        if (!audioEnabled) audioEl.muted = true;
                        document.body.appendChild(audioEl);
                        
                        peerInfo.stream = remoteStream;
                        initVoiceIndicator(remoteStream, peerId); // Подсветка микрофона
                    }
                } else if (event.track.kind === "video") {
                    // Это демка экрана от друга! Открываем плеер сверху
                    const videoEl = document.getElementById("screen-video");
                    videoEl.srcObject = remoteStream;
                    document.getElementById("screen-share-area").style.display = "block";
                    document.getElementById("screen-user-label").innerText = `Демонстрация экрана: ${peerName}`;
                }
            };

            // Создаем карточки интерфейса для нового друга
            addPeerUI(peerId, peerName);

            if (isOffer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendSignal({ type: "offer", targetId: peerId, sdp: offer });
            }
        }

        function removePeer(peerId) {
            const peer = peers.get(peerId);
            if (peer) {
                peer.pc.close();
                peers.delete(peerId);
            }
            const card = document.getElementById(`card-${peerId}`);
            const item = document.getElementById(`uitem-${peerId}`);
            const aud = document.getElementById(`audio-${peerId}`);
            if (card) card.remove();
            if (item) item.remove();
            if (aud) aud.remove();

            // Если этот юзер вел демку — закрываем окно стрима
            if(document.getElementById("screen-user-label").innerText.includes(peer.name)) {
                document.getElementById("screen-share-area").style.display = "none";
            }
            updateOnlineCounter();
        }

        // --- 4. ДИНАМИЧЕСКИЙ ДИЗАЙН И ИНТЕРФЕЙС УЧАСТНИКОВ ---
        function addPeerUI(peerId, peerName) {
            // 1. Добавление в сайдбар списка
            const item = document.createElement("div");
            item.className = "user-item";
            item.id = `uitem-${peerId}`;
            item.innerHTML = `
                <div class="user-avatar">${peerName[0].toUpperCase()}</div>
                <div class="user-info">${peerName}</div>
                <div class="user-status-icons" id="mic-status-${peerId}">🎙 Вкл</div>
            `;
            usersContainer.appendChild(item);

            // 2. Создание голосовой карточки в центре
            const card = document.createElement("div");
            card.className = "peer-card";
            card.id = `card-${peerId}`;
            card.innerHTML = `
                <div class="avatar-big">${peerName[0].toUpperCase()}</div>
                <div class="name">${peerName}</div>
                <div class="mic-indicator" id="card-mic-status-${peerId}">Собеседник</div>
            `;
            cardsContainer.appendChild(card);
            updateOnlineCounter();
        }

        function updateLocalUserCard() {
            // Добавляем себя в список
            const item = document.createElement("div");
            item.className = "user-item";
            item.innerHTML = `
                <div class="user-avatar" style="background-color: var(--success);">${myName[0].toUpperCase()}</div>
                <div class="user-info"><strong>${myName} (Вы)</strong></div>
            `;
            usersContainer.appendChild(item);

            const card = document.createElement("div");
            card.className = "peer-card";
            card.id = `card-local`;
            card.innerHTML = `
                <div class="avatar-big" style="background-color: var(--success);">${myName[0].toUpperCase()}</div>
                <div class="name">${myName} (Вы)</div>
                <div class="mic-indicator">Ваш микрофон</div>
            `;
            cardsContainer.appendChild(card);
        }

        function updateOnlineCounter() {
            // Считаем нас + пиров
            const count = peers.size + 1;
            document.querySelector(".sidebar-header h3").innerText = `В сети комнаты (${count}):`;
        }

        // --- 5. ФУНКЦИЯ ПОДСВЕТКИ ГОВОРЯЩЕГО (Анализ громкости звука) ---
        function initVoiceIndicator(stream, peerId) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                source.connect(analyser);

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function checkVolume() {
                    if (!peers.has(peerId)) return; // Стоп, если юзер вышел
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    let average = sum / dataArray.length;
                    
                    const card = document.getElementById(`card-${peerId}`);
                    if (card) {
                        // Если средняя частота выше порога шума — подсвечиваем карточку зеленым (как в Discord)
                        if (average > 12) {
                            card.classList.add("speaking");
                        } else {
                            card.classList.remove("speaking");
                        }
                    }
                    requestAnimationFrame(checkVolume);
                }
                checkVolume();
            } catch(e){}
        }

        // --- 6. КНОПКИ УПРАВЛЕНИЯ (МУТ, ДЕМКА, ЧАТ) ---
        
        // Мут микрофона
        document.getElementById("toggle-mic-btn").addEventListener("click", (e) => {
            micEnabled = !micEnabled;
            localAudioStream.getAudioTracks().forEach(track => track.enabled = micEnabled);
            
            e.target.classList.toggle("active", micEnabled);
            e.target.classList.toggle("danger", !micEnabled);
            e.target.innerText = micEnabled ? "🎙 Микро" : "🎙 Мут";

            // Отправляем статус мута всем остальным
            sendSignal({ type: "status_update", micEnabled: micEnabled });
        });

        // Отключение входящего звука (Deafen)
        document.getElementById("toggle-audio-btn").addEventListener("click", (e) => {
            audioEnabled = !audioEnabled;
            peers.forEach((peer, id) => {
                const aud = document.getElementById(`audio-${id}`);
                if (aud) aud.muted = !audioEnabled;
            });
            e.target.classList.toggle("active", audioEnabled);
            e.target.classList.toggle("danger", !audioEnabled);
            e.target.innerText = audioEnabled ? "🔊 Звук" : "🔇 Выкл";
        });

        // ДЕМОНСТРАЦИЯ ЭКРАНА (ДЕМКА)
        document.getElementById("share-screen-btn").addEventListener("click", async (e) => {
            if (!isSharingScreen) {
                try {
                    // Запрашиваем захват экрана у системы
                    localScreenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                    isSharingScreen = true;
                    e.target.innerText = "🛑 Остановить демку";
                    e.target.classList.add("danger");

                    // Показываем демку у себя локально в верхнем окне
                    const localVideo = document.getElementById("screen-video");
                    localVideo.srcObject = localScreenStream;
                    document.getElementById("screen-share-area").style.display = "block";
                    document.getElementById("screen-user-label").innerText = `Демонстрация экрана: Вы`;

                    // Добавляем видеотрек во все текущие P2P коннекты к друзьям
                    const videoTrack = localScreenStream.getVideoTracks()[0];
                    peers.forEach(peer => {
                        peer.pc.addTrack(videoTrack, localScreenStream);
                        // Пересоздаем соединение (Renegotiation)
                        peer.pc.createOffer().then(offer => {
                            peer.pc.setLocalDescription(offer);
                            sendSignal({ type: "offer", targetId: peer.pc.remoteDescription ? null : id, sdp: offer });
                        });
                    });

                    // Авто-отключение демки, если нажать системную кнопку внизу экрана
                    videoTrack.onended = () => { stopScreenShare(e.target); };

                } catch (err) {
                    console.log("Демка отменена или произошла ошибка: ", err);
                }
            } else {
                stopScreenShare(e.target);
            }
        });

        function stopScreenShare(btnElement) {
            isSharingScreen = false;
            btnElement.innerText = "🖥 Включить демку";
            btnElement.classList.remove("danger");
            document.getElementById("screen-share-area").style.display = "none";

            if (localScreenStream) {
                localScreenStream.getTracks().forEach(track => track.stop());
                localScreenStream = null;
            }
            // Оповещаем друзей обновить стрим
            sendSignal({ type: "join", senderName: myName });
        }

        // ТЕКСТОВЫЙ ЧАТ
        function appendChatMessage(author, text) {
            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerHTML = `<span class="msg-author">${author}:</span>${text}`;
            chatMsgContainer.appendChild(msg);
            chatMsgContainer.scrollTop = chatMsgContainer.scrollHeight;
        }

        function sendTextMessage() {
            const text = chatInput.value.trim();
            if (text === "") return;
            sendSignal({ type: "chat", text: text });
            appendChatMessage(myName + " (Вы)", text);
            chatInput.value = "";
        }

        document.getElementById("chat-send-btn").addEventListener("click", sendTextMessage);
        chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendTextMessage(); });

        // Выход из игры
        document.getElementById("leave-btn").addEventListener("click", () => {
            sendSignal({ type: "leave" });
            window.location.reload();
        });

        window.onbeforeunload = () => {
            if(mqttClient) sendSignal({ type: "leave" });
        };
    </script>
</body>
</html>
