<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Craft Racer 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            line-height: 1.5;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 18px;
            text-shadow: 2px 2px 0px #000;
            text-align: center;
            z-index: 10;
        }
    </style>
    <!-- Подключаем Three.js для работы с 3D графикой -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        СКОРОСТЬ: <span id="speed">0</span> КМ/Ч<br>
        ДИСТАНЦИЯ: <span id="distance">0</span> М
    </div>
    <div id="instructions">УПРАВЛЕНИЕ: СТРЕЛКИ или WASD</div>

    <script>
        // --- НАСТРОЙКА СЦЕНЫ И КАМЕРЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        // Туман для плавного ретро-горизонта
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Выключаем сглаживание для пиксельного стиля
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ОСВЕЩЕНИЕ ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
        dirLight.position.set(15, 30, 15);
        scene.add(dirLight);

        // --- ИГРОК (МАШИНКА ИЗ БЛОКОВ) ---
        const car = new THREE.Group();
        
        // Главный кузов
        const bodyGeom = new THREE.BoxGeometry(1.8, 0.6, 3.4);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0xe74c3c });
        const carBody = new THREE.Mesh(bodyGeom, bodyMat);
        carBody.position.y = 0.5;
        car.add(carBody);

        // Кабина (стекло/крыша)
        const cabinGeom = new THREE.BoxGeometry(1.4, 0.6, 1.8);
        const cabinMat = new THREE.MeshLambertMaterial({ color: 0x2c3e50 });
        const cabin = new THREE.Mesh(cabinGeom, cabinMat);
        cabin.position.set(0, 1.1, -0.2);
        car.add(cabin);

        // Колеса
        const wheelGeom = new THREE.BoxGeometry(0.4, 0.7, 0.7);
        const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const wheels = [];
        const wheelPositions = [
            [1, 0.35, 1], [-1, 0.35, 1],
            [1, 0.35, -1], [-1, 0.35, -1]
        ];

        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeom, wheelMat);
            wheel.position.set(pos[0], pos[1], pos[2]);
            car.add(wheel);
            wheels.push(wheel);
        });

        scene.add(car);

        // --- ДИНАМИКА И ФИЗИКА ---
        let speed = 0;
        const maxSpeed = 1.3;
        const accel = 0.012;
        const deccel = 0.008;
        let carX = 0;

        const keys = { Forward: false, Backward: false, Left: false, Right: false };

        // --- ПРОЦЕДУРНАЯ ГЕНЕРАЦИЯ МИРА (БЛОКИ) ---
        const obstacles = [];
        const segments = [];
        let lastSegmentZ = 0;
        const segmentLength = 8;
        const maxSegments = 25;

        function createSegment(z) {
            const segmentGroup = new THREE.Group();
            const isEven = Math.floor(Math.abs(z) / segmentLength) % 2 === 0;

            // Дорожное полотно (чередующиеся цвета)
            const roadColor = isEven ? 0x2d3436 : 0x353b48;
            const roadGeom = new THREE.BoxGeometry(12, 0.2, segmentLength);
            const roadMat = new THREE.MeshLambertMaterial({ color: roadColor });
            const road = new THREE.Mesh(roadGeom, roadMat);
            road.position.set(0, -0.1, z - segmentLength / 2);
            segmentGroup.add(road);

            // Обочины (зеленый крафт-газон)
            const sideColor = isEven ? 0x26de81 : 0x20bf6b;
            const sideMat = new THREE.MeshLambertMaterial({ color: sideColor });
            const sideGeom = new THREE.BoxGeometry(30, 0.1, segmentLength);
            
            const leftSide = new THREE.Mesh(sideGeom, sideMat);
            leftSide.position.set(-21, -0.15, z - segmentLength / 2);
            segmentGroup.add(leftSide);

            const rightSide = new THREE.Mesh(sideGeom, sideMat);
            rightSide.position.set(21, -0.15, z - segmentLength / 2);
            segmentGroup.add(rightSide);

            // Бордюрная разметка (красно-белая классика)
            const curbColor = isEven ? 0xffffff : 0xfc5c65;
            const curbMat = new THREE.MeshLambertMaterial({ color: curbColor });
            const curbGeom = new THREE.BoxGeometry(0.4, 0.3, segmentLength);
            
            const leftCurb = new THREE.Mesh(curbGeom, curbMat);
            leftCurb.position.set(-6.2, 0.1, z - segmentLength / 2);
            segmentGroup.add(leftCurb);

            const rightCurb = new THREE.Mesh(curbGeom, curbMat);
            rightCurb.position.set(6.2, 0.1, z - segmentLength / 2);
            segmentGroup.add(rightCurb);

            // Майнкрафт-деревья по бокам дороги
            if (Math.random() > 0.3) createBlockTree(segmentGroup, -9 - Math.random() * 5, z - Math.random() * segmentLength);
            if (Math.random() > 0.3) createBlockTree(segmentGroup, 9 + Math.random() * 5, z - Math.random() * segmentLength);

            // Генерация препятствий на трассе
            if (Math.abs(z) > 50 && Math.random() > 0.6) {
                const obsX = (Math.random() - 0.5) * 9.5;
                const obsZ = z - Math.random() * segmentLength;
                createObstacle(segmentGroup, obsX, obsZ);
            }

            scene.add(segmentGroup);
            segments.push({ z: z, mesh: segmentGroup });
        }

        function createBlockTree(group, x, z) {
            const tree = new THREE.Group();
            
            // Коричневый ствол
            const trunkGeom = new THREE.BoxGeometry(0.6, 2.4, 0.6);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
            const trunk = new THREE.Mesh(trunkGeom, trunkMat);
            trunk.position.y = 1.2;
            tree.add(trunk);

            // Зеленая квадратная листва
            const leavesGeom = new THREE.BoxGeometry(2, 2, 2);
            const leavesMat = new THREE.MeshLambertMaterial({ color: 0x26af61 });
            const leaves = new THREE.Mesh(leavesGeom, leavesMat);
            leaves.position.y = 2.8;
            tree.add(leaves);

            tree.position.set(x, 0, z);
            group.add(tree);
        }

        function createObstacle(group, x, z) {
            const obsGeom = new THREE.BoxGeometry(1.4, 1.2, 1.4);
            const obsMat = new THREE.MeshLambertMaterial({ color: 0xd35400 }); // Оранжевый воксельный блок
            const obs = new THREE.Mesh(obsGeom, obsMat);
            obs.position.set(x, 0.6, z);
            group.add(obs);
            
            obstacles.push({ x: x, z: z, mesh: obs });
        }

        function updateTrack() {
            // Генерируем чанки вперед по ходу движения игрока
            while (lastSegmentZ > car.position.z - maxSegments * segmentLength) {
                createSegment(lastSegmentZ);
                lastSegmentZ -= segmentLength;
            }

            // Очищаем старые чанки сзади для оптимизации
            for (let i = segments.length - 1; i >= 0; i--) {
                if (segments[i].z > car.position.z + 15) {
                    scene.remove(segments[i].mesh);
                    const deletedZ = segments[i].z;
                    
                    // Удаляем отработавшие препятствия
                    for (let j = obstacles.length - 1; j >= 0; j--) {
                        if (obstacles[j].z <= deletedZ && obstacles[j].z > deletedZ - segmentLength) {
                            obstacles.splice(j, 1);
                        }
                    }
                    segments.splice(i, 1);
                }
            }
        }

        // --- УПРАВЛЕНИЕ КЛАВИАТУРОЙ ---
        const handler = (e, status) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.Forward = status;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.Backward = status;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.Left = status;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.Right = status;
        };
        window.addEventListener('keydown', (e) => handler(e, true));
        window.addEventListener('keyup', (e) => handler(e, false));

        // --- ПРОВЕРКА СТОЛКНОВЕНИЙ ---
        function checkCollisions() {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const distX = Math.abs(car.position.x - obs.x);
                const distZ = Math.abs(car.position.z - obs.z);

                // Если габариты пересеклись — отлетаем назад
                if (distX < 1.5 && distZ < 2.2) {
                    speed = -0.3; 
                    document.getElementById('ui').style.color = '#ff4d4d'; // Мигание интерфейса при ударе
                    setTimeout(() => { document.getElementById('ui').style.color = '#fff'; }, 150);
                }
            }
        }

        // --- ИГРОВОЙ ЦИКЛ (ИЗМЕНЕНИЯ КАЖДЫЙ КАДР) ---
        function animate() {
            requestAnimationFrame(animate);

            // Разгон и торможение
            if (keys.Forward) speed = Math.min(speed + accel, maxSpeed);
            else if (keys.Backward) speed = Math.max(speed - accel, -maxSpeed / 2);
            else {
                if (speed > 0) speed = Math.max(0, speed - deccel);
                if (speed < 0) speed = Math.min(0, speed + deccel);
            }

            // Повороты руля (только в движении)
            if (keys.Left && Math.abs(speed) > 0.05) carX -= 0.11 * (speed / maxSpeed);
            if (keys.Right && Math.abs(speed) > 0.05) carX += 0.11 * (speed / maxSpeed);

            // Ограничение съезда в кювет
            if (carX < -5.4) { carX = -5.4; speed *= 0.96; }
            if (carX > 5.4) { carX = 5.4; speed *= 0.96; }

            // Обновление позиций
            car.position.z -= speed; // Движение вперед по оси Z
            car.position.x = carX;

            // Вращение колес в такт скорости
            wheels.forEach(w => w.rotation.x -= speed);

            // Эффект ретро-наклона кузова на поворотах
            if (keys.Left && speed > 0.1) car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, 0.07, 0.1);
            else if (keys.Right && speed > 0.1) car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, -0.07, 0.1);
            else car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, 0, 0.1);

            // Камера плавно следует позади машинки
            camera.position.set(car.position.x * 0.65, 4.3, car.position.z + 7.5);
            camera.lookAt(car.position.x, 1.1, car.position.z - 5);

            // Логика мира
            updateTrack();
            checkCollisions();

            // Рендеринг интерфейса
            document.getElementById('speed').innerText = Math.round(Math.max(0, speed * 160));
            document.getElementById('distance').innerText = Math.round(Math.abs(car.position.z));

            renderer.render(scene, camera);
        }

        // Поддержка изменения размеров окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Старт игры
        animate();
    </script>
</body>
</html>
