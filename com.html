<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Voxel Racer 3D - Balanced</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #08060c;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
            display: none;
            z-index: 5;
        }
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #fff;
        }
        h1 {
            font-size: 42px;
            color: #00ffff;
            text-shadow: 3px 3px 0px #ff0055;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }
        .btn {
            padding: 12px 35px;
            font-size: 22px;
            font-family: inherit;
            background: #ff0055;
            border: 3px solid #fff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 4px 4px 0px #00ffff;
            transition: 0.1s;
        }
        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #00ffff;
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #00ffff;
        }
        #game-over-screen { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        СКОРОСТЬ: <span id="speed">0</span> КМ/Ч<br>
        ДИСТАНЦИЯ: <span id="distance">0</span> М
    </div>

    <div id="main-menu" class="screen">
        <h1>RETRORUN 3D</h1>
        <button class="btn" onclick="startGame()">ПОЕХАЛИ</button>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 style="color: #ff3333; text-shadow: 3px 3px 0px #000;">АВАРИЯ</h1>
        <p id="final-score" style="font-size: 20px; margin-bottom: 20px;"></p>
        <button class="btn" onclick="restartGame()">СТАРТ ЗАНОВО</button>
    </div>

    <script>
        // --- НАСТРОЙКА СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        scene.fog = new THREE.FogExp2(0x0a0a12, 0.025);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        // --- SVG ТЕКСТУРЫ (БЕЗ ЭМОДЗИ) ---
        function createSVGTexture(svgString) {
            const v = encodeURIComponent(svgString);
            const img = new Image();
            img.src = `data:image/svg+xml;charset=utf-8,${v}`;
            const texture = new THREE.Texture(img);
            img.onload = () => texture.needsUpdate = true;
            return texture;
        }

        const playerSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="#e74c3c"/><path d="M10 54h12v6H10zm32 0h12v6H42z" fill="#fff"/><path d="M12 4h10v4H12zm30 0h10v4H42z" fill="#ff3300"/></svg>`;
        const trafficSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="#34495e"/><path d="M10 4h12v4H10zm32 0h12v4H42z" fill="#fff"/></svg>`;
        const roadSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128"><rect width="128" height="128" fill="#1e1e24"/><path d="M62 0h4v30h-4zm0 49h4v30h-4zm0 49h4v30h-4z" fill="#555"/></svg>`;

        const playerMat = new THREE.MeshLambertMaterial({ map: createSVGTexture(playerSvg) });
        const trafficMat = new THREE.MeshLambertMaterial({ map: createSVGTexture(trafficSvg) });
        const roadMat = new THREE.MeshLambertMaterial({ map: createSVGTexture(roadSvg) });

        // --- ИГРОК ---
        const car = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 2.8), playerMat);
        carBody.position.y = 0.35;
        car.add(carBody);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.45, 1.4), new THREE.MeshLambertMaterial({ color: 0x111111 }));
        cabin.position.set(0, 0.8, -0.1);
        car.add(cabin);

        const wheels = [];
        [ [0.85, 0.25, 0.8], [-0.85, 0.25, 0.8], [0.85, 0.25, -0.8], [-0.85, 0.25, -0.8] ].forEach(pos => {
            const w = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.5), new THREE.MeshLambertMaterial({ color: 0x0a0a0a }));
            w.position.set(pos[0], pos[1], pos[2]);
            car.add(w);
            wheels.push(w);
        });
        scene.add(car);

        // --- МЯГКИЙ ЗВУК МОТОРА (БЕЗ СИНТЕЗАТОРА МУЗЫКИ) ---
        let audioCtx, engineOsc, audioStarted = false;

        function initAudio() {
            if (audioStarted) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                engineOsc = audioCtx.createOscillator();
                const engineGain = audioCtx.createGain();
                
                // Испольуем тихий мягкий треугольный тип волны вместо пищащего sawtooth
                engineOsc.type = 'triangle'; 
                engineOsc.frequency.setValueAtTime(25, audioCtx.currentTime);
                
                // Минимальная громкость, чтобы просто давать глухой объем
                engineGain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
                
                engineOsc.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOsc.start();
                audioStarted = true;
            } catch(e) { console.log("Audio error"); }
        }

        // --- НАСТРОЙКИ КОМФОРТНОГО ДВИЖЕНИЯ ---
        let speed = 0;
        const maxSpeed = 0.38;  // Замедлил машину в 2 раза для адекватного контроля
        const accel = 0.003;   // Плавный разгон
        const deccel = 0.006;  // Плавное торможение
        let carX = 0;
        let isPlaying = false;

        const keys = { Forward: false, Brake: false, Left: false, Right: false };

        const handleKey = (e, isDown) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.Forward = isDown;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.Brake = isDown; 
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.Left = isDown;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.Right = isDown;
        };
        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        // --- СТРОГИЙ ТРАФИК И ТРАССА ---
        let traffic = [];
        let segments = [];
        let lastSegmentZ = 0;
        const segmentLength = 10;
        const maxSegments = 15;
        const lanes = [-2.6, 0, 2.6]; // Три четкие полосы движения

        function createSegment(z) {
            const group = new THREE.Group();
            
            // Дорога
            const road = new THREE.Mesh(new THREE.BoxGeometry(9.0, 0.2, segmentLength), roadMat);
            road.position.set(0, -0.1, z - segmentLength / 2);
            group.add(road);

            // Окружение (земля)
            const grass = new THREE.Mesh(new THREE.BoxGeometry(30, 0.1, segmentLength), new THREE.MeshLambertMaterial({ color: 0x111612 }));
            grass.position.set(0, -0.15, z - segmentLength / 2);
            group.add(grass);

            // Ограничительные столбики по бокам
            if (Math.abs(z) % 20 === 0) {
                const pillarL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshLambertMaterial({color: 0x777}));
                pillarL.position.set(-4.7, 0.4, z);
                const pillarR = pillarL.clone();
                pillarR.position.x = 4.7;
                group.add(pillarL, pillarR);
            }

            // Спавн машин: ОЧЕНЬ редко (шанс снижен, привязка к полосам)
            if (Math.abs(z) > 100 && Math.random() > 0.94) {
                const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
                
                // Проверка, чтобы машины не спавнились друг в друге
                let spaceFree = true;
                traffic.forEach(t => { if(Math.abs(t.position.z - z) < 15 && t.userData.lane === randomLane) spaceFree = false; });
                
                if (spaceFree) {
                    spawnTrafficCar(z - segmentLength / 2, randomLane);
                }
            }

            scene.add(group);
            segments.push({ z: z, mesh: group });
        }

        function spawnTrafficCar(z, laneX) {
            const tCar = new THREE.Group();
            const tBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2.6), trafficMat);
            tBody.position.y = 0.35;
            tCar.add(tBody);

            const tCabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 1.2), new THREE.MeshLambertMaterial({color: 0x0a0a0a}));
            tCabin.position.set(0, 0.75, 0.1);
            tCar.add(tCabin);

            tCar.position.set(laneX, 0, z);
            tCar.userData = { speed: 0.06 + Math.random() * 0.04, lane: laneX }; 

            scene.add(tCar);
            traffic.push(tCar);
        }

        function updateWorld() {
            while (lastSegmentZ > car.position.z - maxSegments * segmentLength) {
                createSegment(lastSegmentZ);
                lastSegmentZ -= segmentLength;
            }

            for (let i = segments.length - 1; i >= 0; i--) {
                if (segments[i].z > car.position.z + 20) {
                    scene.remove(segments[i].mesh);
                    segments.splice(i, 1);
                }
            }

            for (let i = traffic.length - 1; i >= 0; i--) {
                const tCar = traffic[i];
                tCar.position.z += tCar.userData.speed; // Медленно катятся навстречу

                if (tCar.position.z > car.position.z + 20) {
                    scene.remove(tCar);
                    traffic.splice(i, 1);
                }
            }
        }

        // --- ДВИЖОК ИГРЫ ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                // Движение строго вперед. Назад ехать НЕЛЬЗЯ (минимальная скорость = 0)
                if (keys.Forward) speed = Math.min(speed + accel, maxSpeed);
                else if (keys.Brake) speed = Math.max(0, speed - deccel * 2); 
                else speed = Math.max(0, speed - deccel);

                // Плавный поворот руля
                if (keys.Left && speed > 0.02) carX -= 0.06;
                if (keys.Right && speed > 0.02) carX += 0.06;

                // Границы трассы
                if (carX < -3.8) carX = -3.8;
                if (carX > 3.8) carX = 3.8;

                car.position.z -= speed;
                car.position.x = carX;

                wheels.forEach(w => w.rotation.x -= speed);

                // Корректировка тона мотора под скорость (тихое урчание)
                if (engineOsc && audioCtx) {
                    engineOsc.frequency.setValueAtTime(25 + speed * 90, audioCtx.currentTime);
                }

                // Четкие хитбоксы для аварий
                traffic.forEach(tCar => {
                    const dX = Math.abs(car.position.x - tCar.position.x);
                    const dZ = Math.abs(car.position.z - tCar.position.z);
                    if (dX < 1.3 && dZ < 2.4) {
                        gameOver();
                    }
                });

                updateWorld();

                // Вывод адекватных цифр на спидометр
                document.getElementById('speed').innerText = Math.round(speed * 320);
                document.getElementById('distance').innerText = Math.round(Math.abs(car.position.z));
            }

            // Камера за машиной
            camera.position.set(car.position.x * 0.5, 3.2, car.position.z + 5.5);
            camera.lookAt(car.position.x, 0.7, car.position.z - 3);

            renderer.render(scene, camera);
        }

        // --- СОСТОЯНИЯ ---
        function startGame() {
            initAudio();
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            isPlaying = true;
        }

        function gameOver() {
            isPlaying = false;
            if (engineOsc) engineOsc.frequency.setValueAtTime(0, audioCtx.currentTime);
            document.getElementById('ui').style.display = 'none';
            document.getElementById('final-score').innerText = `Результат: ${Math.round(Math.abs(car.position.z))} метров`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function restartGame() {
            speed = 0;
            carX = 0;
            car.position.set(0, 0, 0);
            
            traffic.forEach(tCar => scene.remove(tCar));
            traffic = [];
            segments.forEach(s => scene.remove(s.mesh));
            segments = [];
            lastSegmentZ = 0;

            if (engineOsc && audioCtx) engineOsc.frequency.setValueAtTime(25, audioCtx.currentTime);

            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            isPlaying = true;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
