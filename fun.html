<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабиринт Ужаса</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #fff; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        #stamina-bar { width: 200px; height: 10px; background: #333; border: 1px solid #555; margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; display: none; text-align: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div>СТАМИНА</div>
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
        <div style="margin-top: 10px;">[WASD] Ходьба | [SHIFT] Спринт | [F] Фонарик</div>
    </div>
    <div id="message"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x111111);
        scene.add(ambientLight);

        const flashlight = new THREE.SpotLight(0xffffff, 2, 40, Math.PI / 6, 0.5, 1);
        flashlight.position.set(0, 0, 0);
        camera.add(flashlight);
        flashlight.target.position.set(0, 0, -1);
        camera.add(flashlight.target);
        scene.add(camera);

        // Лабиринт (простая генерация)
        const mapSize = 20;
        const walls = [];
        const geometry = new THREE.BoxGeometry(2, 4, 2);
        const material = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
        
        for (let x = -mapSize; x <= mapSize; x += 2) {
            for (let z = -mapSize; z <= mapSize; z += 2) {
                if (Math.random() > 0.7 || x === 0 && z === 0) continue;
                const wall = new THREE.Mesh(geometry, material);
                wall.position.set(x, 2, z);
                scene.add(wall);
                walls.push(wall);
            }
        }

        // "Страшная ебака"
        const monsterGeo = new THREE.ConeGeometry(1, 3, 8);
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const monster = new THREE.Mesh(monsterGeo, monsterMat);
        monster.position.set(10, 1.5, 10);
        scene.add(monster);

        // Аудио
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sawtooth';
        oscillator.frequency.value = 50;
        gainNode.gain.value = 0.05;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();

        // Управление
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let sprint = false;
        let stamina = 100;
        let isFlashlightOn = true;

        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'ShiftLeft': sprint = true; break;
                case 'KeyF': 
                    isFlashlightOn = !isFlashlightOn; 
                    flashlight.intensity = isFlashlightOn ? 2 : 0; 
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
                case 'ShiftLeft': sprint = false; break;
            }
        });

        // Мышь
        document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
        document.addEventListener('click', () => document.body.requestPointerLock());
        
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        });

        // Логика
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // Движение
            const speed = sprint && stamina > 0 ? 0.15 : 0.08;
            if (sprint && (moveForward || moveBackward || moveLeft || moveRight)) stamina = Math.max(0, stamina - 1);
            else stamina = Math.min(100, stamina + 0.5);
            
            document.getElementById('stamina-fill').style.width = stamina + '%';

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * speed;
            if (moveLeft || moveRight) velocity.x -= direction.x * speed;

            camera.translateX(-velocity.x);
            camera.translateZ(-velocity.z);
            velocity.multiplyScalar(0.9);

            // Монстр преследует
            const dist = camera.position.distanceTo(monster.position);
            if (dist > 2) {
                monster.lookAt(camera.position);
                monster.translateZ(0.04);
            } else {
                document.getElementById('message').innerText = "ТЫ ПОГИБ";
                document.getElementById('message').style.display = 'block';
            }

            // Звук зависит от расстояния
            gainNode.gain.value = 0.05 + (20 - Math.min(dist, 20)) * 0.01;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
