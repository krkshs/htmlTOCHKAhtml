<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабиринт Ужаса</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; text-shadow: 1px 1px 0 #000; }
        .bar-container { width: 200px; height: 12px; background: #222; border: 1px solid #555; margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #d00; transition: width 0.1s linear; }
        #message { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 3em; display: none; text-align: center; color: #f00; 
            text-shadow: 0 0 10px #f00; letter-spacing: 5px;
        }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; cursor: pointer;
        }
        h1 { color: #a00; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        p { color: #888; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>ЛАБИРИНТ</h1>
        <p>Кликни, чтобы начать</p>
        <p style="font-size: 0.8em; margin-top: 20px;">[WASD] Ходьба | [SHIFT] Спринт | [F] Фонарик</p>
    </div>

    <div id="ui">
        <div>СТАМИНА</div>
        <div class="bar-container"><div id="stamina-fill"></div></div>
    </div>
    <div id="message">ТЫ ПОГИБ</div>

    <!-- Подключаем Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- НАСТРОЙКИ ---
        const CELL_SIZE = 4;
        const WALL_HEIGHT = 5;
        const MAZE_SIZE = 15; // Размер лабиринта (нечетное число лучше)
        
        let isGameActive = false;
        let isDead = false;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.12); // Густой туман

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ОСВЕЩЕНИЕ ---
        // Очень тусклый общий свет
        const ambientLight = new THREE.AmbientLight(0x111111); 
        scene.add(ambientLight);

        // Фонарик
        const flashlight = new THREE.SpotLight(0xffffee, 1.5, 35, Math.PI / 5, 0.6, 1);
        flashlight.position.set(0.5, -0.5, 0); // Смещение относительно камеры
        flashlight.target.position.set(0, 0, -1);
        camera.add(flashlight);
        camera.add(flashlight.target);
        scene.add(camera);

        // --- МАТЕРИАЛЫ ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // --- ГЕНЕРАЦИЯ ЛАБИРИНТА (Recursive Backtracker) ---
        const walls = [];
        const geometryWall = new THREE.BoxGeometry(CELL_SIZE, WALL_HEIGHT, CELL_SIZE);
        
        // Создаем сетку
        const map = [];
        for(let x=0; x<MAZE_SIZE; x++) {
            map[x] = [];
            for(let z=0; z<MAZE_SIZE; z++) {
                map[x][z] = 1; // 1 = стена
            }
        }

        function carve(x, z) {
            map[x][z] = 0; // 0 = проход
            
            const directions = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
            
            for (let [dx, dz] of directions) {
                const nx = x + dx;
                const nz = z + dz;
                
                if (nx > 0 && nx < MAZE_SIZE && nz > 0 && nz < MAZE_SIZE && map[nx][nz] === 1) {
                    map[x + dx/2][z + dz/2] = 0; // Ломаем стену между клетками
                    carve(nx, nz);
                }
            }
        }
        
        // Запуск генерации с центра
        carve(1, 1);

        // Построение мешей по карте
        const offset = (MAZE_SIZE * CELL_SIZE) / 2;
        
        // Пол
        const floorGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE, MAZE_SIZE * CELL_SIZE);
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        scene.add(floor);

        // Стены
        for(let x=0; x<MAZE_SIZE; x++) {
            for(let z=0; z<MAZE_SIZE; z++) {
                if(map[x][z] === 1) {
                    const wall = new THREE.Mesh(geometryWall, wallMat);
                    wall.position.set(
                        x * CELL_SIZE - offset, 
                        WALL_HEIGHT / 2, 
                        z * CELL_SIZE - offset
                    );
                    scene.add(wall);
                    walls.push(wall); // Для коллизий (упрощенно)
                }
            }
        }

        // --- ИГРОК И МОНСТР ---
        // Ставим игрока в начало (1,1)
        camera.position.set(1 * CELL_SIZE - offset, 1.7, 1 * CELL_SIZE - offset);
        
        // Монстр ("Страшная ебака") - ставим подальше
        const monster = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2.5, 8), monsterMat);
        monster.position.set((MAZE_SIZE-2) * CELL_SIZE - offset, 1.25, (MAZE_SIZE-2) * CELL_SIZE - offset);
        scene.add(monster);

        // Выход (зеленая зона)
        const exitGeo = new THREE.BoxGeometry(2, 0.1, 2);
        const exitMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const exit = new THREE.Mesh(exitGeo, exitMat);
        exit.position.set((MAZE_SIZE-2) * CELL_SIZE - offset, 0.1, (MAZE_SIZE-2) * CELL_SIZE - offset);
        scene.add(exit);


        // --- АУДИО (Web Audio API) ---
        let audioCtx, droneOsc, gainNode, heartbeatOsc, heartGain;
        
        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Низкочастотный гул (нагнетающий)
            droneOsc = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            droneOsc.type = 'sawtooth';
            droneOsc.frequency.value = 40; 
            
            // Фильтр чтобы звук был глухим
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 120;

            droneOsc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.value = 0.03; // ОЧЕНЬ ТИХО
            droneOsc.start();

            // Сердцебиение (появляется когда монстр близко)
            heartbeatOsc = audioCtx.createOscillator();
            heartGain = audioCtx.createGain();
            heartbeatOsc.type = 'triangle';
            heartbeatOsc.frequency.value = 60;
            heartbeatOsc.connect(heartGain);
            heartGain.connect(audioCtx.destination);
            heartGain.gain.value = 0;
            heartbeatOsc.start();
        }

        // --- УПРАВЛЕНИЕ ---
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        let stamina = 100;
        let flashlightOn = true;
        let pitch = 0; // Вертикальный угол камеры

        document.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k) || k === 'shift') keys[k === 'shift' ? 'shift' : k] = true;
            if (k === 'f') {
                flashlightOn = !flashlightOn;
                flashlight.intensity = flashlightOn ? 1.5 : 0;
            }
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k) || k === 'shift') keys[k === 'shift' ? 'shift' : k] = false;
        });

        // Pointer Lock (захват мыши)
        const startScreen = document.getElementById('start-screen');
        startScreen.addEventListener('click', () => {
            document.body.requestPointerLock();
            initAudio();
            startScreen.style.display = 'none';
            isGameActive = true;
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && isGameActive && !isDead) {
                camera.rotation.y -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch)); // Ограничение взгляда вверх/вниз
                camera.rotation.x = pitch;
                camera.rotation.z = 0; // Сброс крена
            }
        });

        // --- ФИЗИКА И ЛОГИКА ---
        const playerSpeed = 0.12;
        const sprintSpeed = 0.22;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function checkCollision(newPos) {
            // Простая проверка: переводим координаты в индексы карты
            // Добавляем небольшой отступ (radius), чтобы не проходить сквозь стены
            const radius = 0.8; 
            
            // Проверяем 4 точки вокруг игрока
            const checks = [
                {x: newPos.x + radius, z: newPos.z},
                {x: newPos.x - radius, z: newPos.z},
                {x: newPos.x, z: newPos.z + radius},
                {x: newPos.x, z: newPos.z - radius}
            ];

            for(let p of checks) {
                const gx = Math.floor((p.x + offset) / CELL_SIZE);
                const gz = Math.floor((p.z + offset) / CELL_SIZE);
                
                if (gx >= 0 && gx < MAZE_SIZE && gz >= 0 && gz < MAZE_SIZE) {
                    if (map[gx][gz] === 1) return true; // Столкновение со стеной
                }
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameActive || isDead) return;

            // 1. Движение
            const speed = (keys.shift && stamina > 0) ? sprintSpeed : playerSpeed;
            
            // Трата стамины
            if (keys.shift && (keys.w || keys.a || keys.s || keys.d)) {
                stamina = Math.max(0, stamina - 1.5);
            } else {
                stamina = Math.min(100, stamina + 0.8);
            }
            document.getElementById('stamina-fill').style.width = stamina + '%';

            // Вектор движения
            direction.z = Number(keys.w) - Number(keys.s);
            direction.x = Number(keys.d) - Number(keys.a);
            direction.normalize();

            if (direction.length() > 0) {
                // Получаем направление "вперед" относительно камеры (игнорируя наклон Y)
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                camDir.y = 0;
                camDir.normalize();
                
                const camRight = new THREE.Vector3();
                camRight.crossVectors(camDir, new THREE.Vector3(0,1,0)).normalize();

                const moveVec = new THREE.Vector3();
                moveVec.addScaledVector(camDir, direction.z);
                moveVec.addScaledVector(camRight, direction.x);
                moveVec.normalize().multiplyScalar(speed);

                // Пробуем двигаться по X и Z отдельно для скольжения вдоль стен
                const nextPos = camera.position.clone();
                nextPos.x += moveVec.x;
                if (!checkCollision(nextPos)) camera.position.x = nextPos.x;

                nextPos.copy(camera.position);
                nextPos.z += moveVec.z;
                if (!checkCollision(nextPos)) camera.position.z = nextPos.z;
                
                // Покачивание камеры при ходьбе
                const time = Date.now() * 0.005;
                const bobAmount = (keys.shift && stamina > 0) ? 0.08 : 0.04;
                camera.position.y = 1.7 + Math.sin(time) * bobAmount;
            }

            // 2. Монстр (AI)
            const distToMonster = camera.position.distanceTo(monster.position);
            
            // Монстр всегда знает где ты
            monster.lookAt(camera.position.x, 1.25, camera.position.z);
            monster.translateZ(0.065); // Скорость монстра (чуть быстрее ходьбы, медленнее спринта)

            // Звук сердцебиения
            if(heartbeatOsc) {
                const proximity = Math.max(0, 25 - distToMonster) / 25; // 0..1
                heartGain.gain.value = proximity * 0.1;
                // Меняем частоту пульса
                heartbeatOsc.frequency.value = 60 + (proximity * 100);
            }

            // Проверка смерти
            if (distToMonster < 1.5) {
                isDead = true;
                document.getElementById('message').style.display = 'block';
                document.exitPointerLock();
                if(gainNode) gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 1); // Резкий звук
            }

            // Проверка победы
            if (camera.position.distanceTo(exit.position) < 2) {
                isDead = true; // Используем тот же флаг для остановки
                document.getElementById('message').innerText = "ТЫ ВЫЖИЛ";
                document.getElementById('message').style.color = "#0f0";
                document.getElementById('message').style.textShadow = "0 0 10px #0f0";
                document.getElementById('message').style.display = 'block';
                document.exitPointerLock();
            }

            renderer.render(scene, camera);
        }

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
